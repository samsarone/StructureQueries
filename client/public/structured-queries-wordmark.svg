<svg xmlns="http://www.w3.org/2000/svg" width="640" height="136" viewBox="0 0 640 136" role="img" aria-labelledby="title desc">
  <title id="title">Structure Queries Wordmark</title>
  <desc id="desc">Futuristic wordmark for Structure Queries with a restrained blue-green accent and stacked premium typography.</desc>

  <defs>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5eaefe" />
      <stop offset="56%" stop-color="#75dfff" />
      <stop offset="100%" stop-color="#64df92" />
    </linearGradient>
  </defs>

  <text
